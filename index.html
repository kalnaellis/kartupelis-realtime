<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kartupelis Realtime</title>
    <style>
      html, body { height: 100%; margin: 0; background:#0b0b10; color:#fff; }
      #app { width: 100%; height: 100%; position: relative; overflow: hidden; }
      .overlay { position:absolute; left:16px; top:16px; font-family: system-ui, sans-serif; opacity:.9; }
      #start { position:absolute; right:16px; top:16px; padding:8px 12px; background:#fff; color:#0b0b10; border:0; border-radius:6px; font-family: system-ui, sans-serif; cursor:pointer; }
      #start:disabled { opacity:.5; cursor:not-allowed; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="overlay" class="overlay">Kartupelis realtime</div>
      <button id="start">Start</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
